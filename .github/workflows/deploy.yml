name: Deploy to GitHub Pages

on:
  push:
    branches: [main-2]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Clean install
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist